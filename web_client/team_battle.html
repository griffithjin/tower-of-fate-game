<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运之塔 - 团队赛</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1a1a3e 50%, #0d1b2a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #ffd700, #ffed4e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #888;
            font-size: 16px;
        }
        
        /* 模式选择 */
        .mode-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .mode-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
        }
        
        .mode-card.selected {
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,215,0,0.1));
            border-color: #ffd700;
        }
        
        .mode-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .mode-name {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .mode-desc {
            font-size: 14px;
            color: #888;
        }
        
        /* 主要内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 25px;
        }
        
        .panel-title {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 团队信息 */
        .team-info {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .team-name {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .team-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
        }
        
        /* 队员列表 */
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .player-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        
        .player-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .player-info {
            flex: 1;
        }
        
        .player-name {
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .player-rank {
            font-size: 12px;
            color: #888;
        }
        
        .captain-badge {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        /* 按钮 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255,215,0,0.2);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #ff6666);
            color: #fff;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        /* 房间输入 */
        .room-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .room-input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        
        .room-input:focus {
            outline: none;
            border-color: #ffd700;
        }
        
        /* 匹配状态 */
        .match-status {
            text-align: center;
            padding: 40px;
        }
        
        .match-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255,215,0,0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .match-text {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .match-timer {
            font-size: 36px;
            color: #fff;
        }
        
        /* 排行榜 */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .leaderboard-table th {
            padding: 12px;
            text-align: left;
            color: #ffd700;
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }
        
        .leaderboard-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .rank-1 { color: #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }
        
        /* 创建团队表单 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #ffd700;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .mode-selector {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a3e, #0d1b2a);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-title {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>⚔️ 团队赛</h1>
            <p>组建你的团队，与其他团队一决高下！</p>
        </div>
        
        <!-- 模式选择 -->
        <div class="mode-selector">
            <div class="mode-card selected" data-mode="2v2" onclick="selectMode('2v2')">
                <div class="mode-icon">👥</div>
                <div class="mode-name">2v2</div>
                <div class="mode-desc">两队各2人</div>
            </div>
            <div class="mode-card" data-mode="3v3" onclick="selectMode('3v3')">
                <div class="mode-icon">👥👥</div>
                <div class="mode-name">3v3</div>
                <div class="mode-desc">两队各3人</div>
            </div>
            <div class="mode-card" data-mode="4v4" onclick="selectMode('4v4')">
                <div class="mode-icon">👥👥👥</div>
                <div class="mode-name">4v4</div>
                <div class="mode-desc">两队各4人</div>
            </div>
            <div class="mode-card" data-mode="5v5" onclick="selectMode('5v5')">
                <div class="mode-icon">👥👥👥👥</div>
                <div class="mode-name">5v5</div>
                <div class="mode-desc">两队各5人</div>
            </div>
        </div>
        
        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 左侧：我的团队 -->
            <div class="panel">
                <div class="panel-title">🏰 我的团队</div>
                
                <!-- 无团队状态 -->
                <div id="noTeamSection">
                    <p style="color: #888; margin-bottom: 20px;">你还没有加入任何团队</p>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="showCreateTeamModal()">创建团队</button>
                        <button class="btn btn-secondary" onclick="showJoinTeamModal()">加入团队</button>
                    </div>
                </div>
                
                <!-- 有团队状态 -->
                <div id="teamSection" class="hidden">
                    <div class="team-info">
                        <div class="team-name" id="teamName">金蛇战队</div>
                        <div style="color: #888;">队长: <span id="captainName">金先生</span></div>
                        <div class="team-stats">
                            <div class="stat-item">
                                <div class="stat-value" id="teamWins">12</div>
                                <div class="stat-label">胜场</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="teamLosses">5</div>
                                <div class="stat-label">负场</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="teamPoints">120</div>
                                <div class="stat-label">积分</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="panel-title">👤 队员列表</div>
                    <div class="player-list" id="playerList">
                        <!-- 动态生成 -->
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="createRoom()">创建房间</button>
                        <button class="btn btn-secondary" onclick="startMatchmaking()">开始匹配</button>
                        <button class="btn btn-danger" onclick="leaveTeam()">离开团队</button>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：对战区域 -->
            <div class="panel">
                <div class="panel-title">⚔️ 对战</div>
                
                <!-- 加入房间 -->
                <div id="joinRoomSection">
                    <p style="color: #888; margin-bottom: 15px;">输入房间码加入对战</p>
                    <div class="room-input-group">
                        <input type="text" class="room-input" id="roomCodeInput" 
                               placeholder="XXXXXX" maxlength="6">
                        <button class="btn btn-primary" onclick="joinRoom()">加入</button>
                    </div>
                    <div style="text-align: center; margin-top: 15px;">
                        <span style="color: #666;">或</span>
                    </div>
                    <button class="btn btn-secondary" style="width: 100%; margin-top: 15px;" 
                            onclick="startMatchmaking()">
                        🎲 快速匹配
                    </button>
                </div>
                
                <!-- 匹配中状态 -->
                <div id="matchingSection" class="hidden">
                    <div class="match-status">
                        <div class="match-spinner"></div>
                        <div class="match-text">正在寻找对手...</div>
                        <div class="match-timer" id="matchTimer">00:00</div>
                        <button class="btn btn-danger" style="margin-top: 20px;" 
                                onclick="cancelMatchmaking()">取消匹配</button>
                    </div>
                </div>
                
                <!-- 排行榜 -->
                <div style="margin-top: 30px;">
                    <div class="panel-title">🏆 团队排行榜 TOP10</div>
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>团队</th>
                                <th>积分</th>
                                <th>胜率</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 创建团队弹窗 -->
    <div class="modal" id="createTeamModal">
        <div class="modal-content">
            <div class="modal-title">🏰 创建团队</div>
            <div class="form-group">
                <label class="form-label">团队名称</label>
                <input type="text" class="form-input" id="newTeamName" 
                       placeholder="输入团队名称" maxlength="12">
            </div>
            <div class="btn-group" style="justify-content: center;">
                <button class="btn btn-primary" onclick="createTeam()">创建</button>
                <button class="btn btn-secondary" onclick="closeModal('createTeamModal')">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 加入团队弹窗 -->
    <div class="modal" id="joinTeamModal">
        <div class="modal-content">
            <div class="modal-title">🔍 加入团队</div>
            <div class="form-group">
                <label class="form-label">团队ID</label>
                <input type="text" class="form-input" id="joinTeamId" 
                       placeholder="输入团队ID">
            </div>
            <div class="btn-group" style="justify-content: center;">
                <button class="btn btn-primary" onclick="joinTeam()">加入</button>
                <button class="btn btn-secondary" onclick="closeModal('joinTeamModal')">取消</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentMode = '2v2';
        let hasTeam = false;
        let isMatching = false;
        let matchStartTime = null;
        let matchTimerInterval = null;
        
        // 初始化
        window.onload = function() {
            connectWebSocket();
            loadLeaderboard();
        };
        
        // WebSocket连接
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:7778');
            
            ws.onopen = () => {
                console.log('已连接到服务器');
                // 获取我的团队信息
                send({type: 'get_my_team'});
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };
            
            ws.onclose = () => {
                console.log('连接断开，3秒后重连...');
                setTimeout(connectWebSocket, 3000);
            };
        }
        
        function send(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            }
        }
        
        // 消息处理
        function handleMessage(msg) {
            console.log('收到消息:', msg);
            
            switch(msg.type) {
                case 'team_info':
                    updateTeamInfo(msg.data);
                    break;
                case 'team_created':
                    if (msg.data.success) {
                        showNotification('团队创建成功！');
                        closeModal('createTeamModal');
                        send({type: 'get_my_team'});
                    } else {
                        showNotification(msg.data.error, 'error');
                    }
                    break;
                case 'team_joined':
                    if (msg.data.success) {
                        showNotification('成功加入团队！');
                        closeModal('joinTeamModal');
                        send({type: 'get_my_team'});
                    } else {
                        showNotification(msg.data.error, 'error');
                    }
                    break;
                case 'team_left':
                    if (msg.data.success) {
                        showNotification(msg.data.message);
                        hasTeam = false;
                        updateTeamUI();
                    }
                    break;
                case 'team_room_created':
                    if (msg.data.success) {
                        showNotification(`房间创建成功！房间码: ${msg.data.data.room.room_code}`);
                    }
                    break;
                case 'team_room_joined':
                    if (msg.data.success) {
                        showNotification('成功加入房间！');
                    } else {
                        showNotification(msg.data.error, 'error');
                    }
                    break;
                case 'team_match_started':
                    if (msg.data.success) {
                        startMatchingUI();
                    }
                    break;
                case 'team_match_cancelled':
                    stopMatchingUI();
                    showNotification('已取消匹配');
                    break;
                case 'team_leaderboard':
                    updateLeaderboard(msg.data);
                    break;
            }
        }
        
        // 选择模式
        function selectMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.remove('selected');
                if (card.dataset.mode === mode) {
                    card.classList.add('selected');
                }
            });
        }
        
        // 更新团队信息
        function updateTeamInfo(data) {
            hasTeam = data && data.has_team !== false;
            
            if (hasTeam) {
                document.getElementById('teamName').textContent = data.name;
                document.getElementById('captainName').textContent = data.captain_name;
                document.getElementById('teamWins').textContent = data.stats?.wins || 0;
                document.getElementById('teamLosses').textContent = data.stats?.losses || 0;
                document.getElementById('teamPoints').textContent = data.stats?.points || 0;
                
                // 更新队员列表
                const playerList = document.getElementById('playerList');
                playerList.innerHTML = (data.players || []).map(p => `
                    <div class="player-item">
                        <div class="player-avatar">👤</div>
                        <div class="player-info">
                            <div class="player-name">${p.nickname}</div>
                            <div class="player-rank">${p.rank} Lv.${p.level}</div>
                        </div>
                        ${p.is_captain ? '<span class="captain-badge">队长</span>' : ''}
                    </div>
                `).join('');
            }
            
            updateTeamUI();
        }
        
        // 更新UI显示
        function updateTeamUI() {
            if (hasTeam) {
                document.getElementById('noTeamSection').classList.add('hidden');
                document.getElementById('teamSection').classList.remove('hidden');
            } else {
                document.getElementById('noTeamSection').classList.remove('hidden');
                document.getElementById('teamSection').classList.add('hidden');
            }
        }
        
        // 弹窗控制
        function showCreateTeamModal() {
            document.getElementById('createTeamModal').classList.add('active');
        }
        
        function showJoinTeamModal() {
            document.getElementById('joinTeamModal').classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        // 团队操作
        function createTeam() {
            const name = document.getElementById('newTeamName').value.trim();
            if (!name) {
                showNotification('请输入团队名称', 'error');
                return;
            }
            send({
                type: 'create_team',
                team_name: name,
                player_name: '金先生'
            });
        }
        
        function joinTeam() {
            const teamId = document.getElementById('joinTeamId').value.trim();
            if (!teamId) {
                showNotification('请输入团队ID', 'error');
                return;
            }
            send({
                type: 'join_team',
                team_id: teamId,
                player_name: '金先生'
            });
        }
        
        function leaveTeam() {
            if (confirm('确定要离开团队吗？')) {
                send({type: 'leave_team'});
            }
        }
        
        // 房间操作
        function createRoom() {
            send({
                type: 'create_team_room',
                mode: currentMode
            });
        }
        
        function joinRoom() {
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (code.length !== 6) {
                showNotification('请输入6位房间码', 'error');
                return;
            }
            send({
                type: 'join_team_room',
                room_code: code
            });
        }
        
        // 匹配操作
        function startMatchmaking() {
            if (!hasTeam) {
                showNotification('你需要先加入一个团队', 'error');
                return;
            }
            send({
                type: 'start_team_match',
                mode: currentMode
            });
        }
        
        function cancelMatchmaking() {
            send({type: 'cancel_team_match'});
        }
        
        function startMatchingUI() {
            isMatching = true;
            matchStartTime = Date.now();
            document.getElementById('joinRoomSection').classList.add('hidden');
            document.getElementById('matchingSection').classList.remove('hidden');
            
            matchTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - matchStartTime) / 1000);
                const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const secs = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('matchTimer').textContent = `${mins}:${secs}`;
            }, 1000);
        }
        
        function stopMatchingUI() {
            isMatching = false;
            clearInterval(matchTimerInterval);
            document.getElementById('joinRoomSection').classList.remove('hidden');
            document.getElementById('matchingSection').classList.add('hidden');
        }
        
        // 排行榜
        function loadLeaderboard() {
            send({type: 'get_team_leaderboard', limit: 10});
        }
        
        function updateLeaderboard(data) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = (data || []).map((team, i) => `
                <tr>
                    <td class="rank-${i < 3 ? i + 1 : ''}">${i + 1}</td>
                    <td>${team.name}</td>
                    <td>${team.points}</td>
                    <td>${team.win_rate}</td>
                </tr>
            `).join('');
        }
        
        // 通知
        function showNotification(message, type = 'success') {
            // 简单的alert，实际应该使用toast组件
            alert(message);
        }
    </script>
</body>
</html>
