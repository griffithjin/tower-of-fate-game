<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运塔 - 商店</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        /* 顶部导航 */
        .header {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 28px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,215,0,0.2);
            color: #ffd700;
        }
        
        .user-currency {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .currency-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        .currency-icon { font-size: 20px; }
        .coins { color: #fbbf24; }
        .gems { color: #a855f7; }
        .points { color: #10b981; }
        
        /* 限时活动横幅 */
        .event-banner {
            background: linear-gradient(90deg, #ff6b6b, #ffd700, #ff6b6b);
            background-size: 200% 100%;
            animation: gradient-shift 3s ease infinite;
            padding: 15px 30px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .event-title {
            font-size: 20px;
            font-weight: bold;
            color: #000;
        }
        
        .countdown {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .countdown-item {
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 5px;
            color: #fff;
            font-weight: bold;
        }
        
        /* 主容器 */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px;
        }
        
        /* 分类筛选 */
        .category-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .category-btn {
            padding: 12px 24px;
            border: 2px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .category-btn:hover, .category-btn.active {
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            border-color: #ffd700;
            color: #000;
            transform: translateY(-2px);
        }
        
        /* 搜索和排序 */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        
        .sort-select {
            padding: 12px 20px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
        }
        
        /* 商品网格 */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .shop-item {
            background: linear-gradient(135deg, rgba(26,26,62,0.9), rgba(13,27,42,0.9));
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            position: relative;
        }
        
        .shop-item:hover {
            transform: translateY(-5px);
            border-color: rgba(255,215,0,0.5);
            box-shadow: 0 15px 40px rgba(255,215,0,0.2);
        }
        
        /* 稀有度样式 */
        .shop-item.common { border-color: rgba(136,136,136,0.3); }
        .shop-item.rare { border-color: rgba(74,158,255,0.3); }
        .shop-item.epic { border-color: rgba(168,85,247,0.3); }
        .shop-item.legendary {
            border-color: rgba(251,191,36,0.5);
            animation: legendary-glow 2s ease-in-out infinite;
        }
        
        @keyframes legendary-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(251,191,36,0.3); }
            50% { box-shadow: 0 0 40px rgba(251,191,36,0.6); }
        }
        
        /* 折扣标签 */
        .discount-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ff4757);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
        }
        
        .discount-timer {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            color: #ffd700;
        }
        
        .item-image {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            position: relative;
        }
        
        .item-rarity-tag {
            position: absolute;
            bottom: 10px;
            left: 10px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .rarity-common { background: #888; color: #fff; }
        .rarity-rare { background: #4a9eff; color: #fff; }
        .rarity-epic { background: #a855f7; color: #fff; }
        .rarity-legendary { background: linear-gradient(45deg, #ffd700, #ff6b6b); color: #000; }
        
        .item-info {
            padding: 20px;
        }
        
        .item-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .item-desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .price-section {
            display: flex;
            flex-direction: column;
        }
        
        .original-price {
            text-decoration: line-through;
            color: #666;
            font-size: 13px;
        }
        
        .current-price {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .buy-btn {
            padding: 10px 25px;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            border: none;
            border-radius: 20px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }
        
        .buy-btn:disabled {
            background: rgba(255,255,255,0.1);
            color: #666;
            cursor: not-allowed;
            transform: none;
        }
        
        .buy-btn.owned {
            background: rgba(0,255,0,0.2);
            color: #0f0;
        }
        
        /* 积分兑换区 */
        .points-exchange {
            background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(16,185,129,0.05));
            border: 2px solid rgba(16,185,129,0.3);
            border-radius: 20px;
            padding: 30px;
            margin-top: 50px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .points-balance {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            color: #10b981;
        }
        
        /* 购买弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a3e, #0d1b2a);
            border-radius: 25px;
            border: 3px solid #ffd700;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        
        .modal-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .modal-price {
            font-size: 36px;
            color: #ffd700;
            margin: 20px 0;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .modal-btn.confirm {
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            color: #000;
        }
        
        .modal-btn.cancel {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        /* 背包预览 */
        .inventory-preview {
            position: fixed;
            right: 30px;
            top: 100px;
            width: 300px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .inventory-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .inventory-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .inventory-item:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.1);
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .inventory-preview { display: none; }
        }
        
        @media (max-width: 768px) {
            .shop-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .header { flex-wrap: wrap; gap: 15px; }
            .nav-links { order: 3; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo">🏰 命运塔商店</div>
        <nav class="nav-links">
            <a href="index.html">🏠 首页</a>
            <a href="shop.html" class="active">🏪 商店</a>
            <a href="profile.html">👤 个人</a>
        </nav>
        <div class="user-currency">
            <div class="currency-item">
                <span class="currency-icon">🪙</span>
                <span id="userCoins" class="coins">10,000</span>
            </div>
            <div class="currency-item">
                <span class="currency-icon">💎</span>
                <span id="userGems" class="gems">500</span>
            </div>
            <div class="currency-item">
                <span class="currency-icon">🏆</span>
                <span id="userPoints" class="points">2,500</span>
            </div>
        </div>
    </header>
    
    <!-- 限时活动横幅 -->
    <div class="event-banner" id="eventBanner">
        <div class="event-title">🔥 周末特惠活动 - 全场7折起</div>
        <div class="countdown">
            <span>距离结束:</span>
            <div class="countdown-item" id="countdownH">23</div>
            <span>:</span>
            <div class="countdown-item" id="countdownM">59</div>
            <span>:</span>
            <div class="countdown-item" id="countdownS">59</div>
        </div>
    </div>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 分类筛选 -->
        <div class="category-filter">
            <button class="category-btn active" data-category="all">
                <i class="fas fa-th"></i> 全部
            </button>
            <button class="category-btn" data-category="skin">
                <i class="fas fa-tshirt"></i> 皮肤
            </button>
            <button class="category-btn" data-category="effect">
                <i class="fas fa-magic"></i> 特效
            </button>
            <button class="category-btn" data-category="cardback">
                <i class="fas fa-square"></i> 卡背
            </button>
            <button class="category-btn" data-category="avatar">
                <i class="fas fa-user-circle"></i> 头像框
            </button>
            <button class="category-btn" data-category="item">
                <i class="fas fa-box"></i> 道具
            </button>
            <button class="category-btn" data-category="pack">
                <i class="fas fa-gift"></i> 礼包
            </button>
        </div>
        
        <!-- 搜索和排序 -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索商品...">
            </div>
            <select class="sort-select" id="sortSelect">
                <option value="default">默认排序</option>
                <option value="price-asc">价格从低到高</option>
                <option value="price-desc">价格从高到低</option>
                <option value="rarity">稀有度</option>
                <option value="newest">最新上架</option>
            </select>
        </div>
        
        <!-- 商品网格 -->
        <div class="shop-grid" id="shopGrid">
            <!-- 商品卡片将通过JS动态生成 -->
        </div>
        
        <!-- 积分兑换区 -->
        <div class="points-exchange">
            <div class="section-header">
                <div class="section-title">
                    <span>🏆</span>
                    <span>积分兑换商城</span>
                </div>
                <div class="points-balance">
                    <span>我的积分:</span>
                    <span id="pointsBalance">2,500</span>
                </div>
            </div>
            <div class="shop-grid" id="pointsShopGrid">
                <!-- 积分商品将通过JS动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 背包预览 -->
    <div class="inventory-preview">
        <div class="inventory-title">🎒 我的背包</div>
        <div class="inventory-grid" id="inventoryGrid">
            <!-- 背包物品将通过JS动态生成 -->
        </div>
    </div>
    
    <!-- 购买确认弹窗 -->
    <div class="modal-overlay" id="purchaseModal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎁</div>
            <div class="modal-title" id="modalTitle">确认购买?</div>
            <div id="modalDesc">商品描述</div>
            <div class="modal-price" id="modalPrice">500 💎</div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" onclick="confirmPurchase()">确认购买</button>
            </div>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div id="toast" style="display:none;position:fixed;top:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#ffd700;padding:15px 30px;border-radius:10px;border:2px solid #ffd700;z-index:2000;"></div>

    <script src="shop-expanded.js"></script>
    <script>
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            initShop();
            renderShop();
            renderPointsShop();
            renderInventory();
            startCountdown();
            bindEvents();
        });
        
        // ==================== 商店实例 ====================
        let shopInstance = null;
        let currentItem = null;
        
        function initShop() {
            shopInstance = new TowerShop();
            updateCurrencyDisplay();
        }
        
        // ==================== 渲染商店 ====================
        function renderShop() {
            const grid = document.getElementById('shopGrid');
            const items = shopInstance.filterItems(shopInstance.activeFilters);
            
            grid.innerHTML = items.map(item => {
                const discount = shopInstance.getDiscountInfo(item.id);
                const isOwned = shopInstance.isOwned(item.id);
                const canAfford = shopInstance.canAfford(item);
                
                const rarityClass = item.rarity;
                const rarityText = { common: '普通', rare: '稀有', epic: '史诗', legendary: '传说' }[item.rarity];
                
                let priceHtml = '';
                if (discount) {
                    priceHtml = `
                        <div class="price-section">
                            <span class="original-price">${item.price} ${item.currency === 'coin' ? '🪙' : '💎'}</span>
                            <span class="current-price">${discount.discountPrice} ${item.currency === 'coin' ? '🪙' : '💎'}</span>
                        </div>
                    `;
                } else {
                    priceHtml = `
                        <div class="price-section">
                            <span class="current-price">${item.price} ${item.currency === 'coin' ? '🪙' : '💎'}</span>
                        </div>
                    `;
                }
                
                return `
                    <div class="shop-item ${rarityClass}" data-id="${item.id}">
                        ${discount ? `<div class="discount-badge">-${discount.discountRate}%</div>` : ''}
                        ${discount ? `<div class="discount-timer">⏰ 限时</div>` : ''}
                        <div class="item-image">
                            ${item.icon}
                            <span class="item-rarity-tag rarity-${item.rarity}">${rarityText}</span>
                        </div>
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-desc">${item.description}</div>
                            <div class="item-footer">
                                ${priceHtml}
                                <button class="buy-btn ${isOwned ? 'owned' : ''}" 
                                        ${isOwned || !canAfford ? 'disabled' : ''} 
                                        onclick="${isOwned ? '' : `openPurchaseModal('${item.id}')`}">
                                    ${isOwned ? '已拥有' : (canAfford ? '购买' : '余额不足')}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ==================== 积分商城 ====================
        function renderPointsShop() {
            const grid = document.getElementById('pointsShopGrid');
            const pointsItems = [
                { id: 'points_coins_1000', name: '1000金币', icon: '🪙', desc: '游戏基础货币', price: 100, type: 'coins', amount: 1000 },
                { id: 'points_gems_50', name: '50钻石', icon: '💎', desc: '高级货币', price: 500, type: 'gems', amount: 50 },
                { id: 'points_xray', name: '透视卡×3', icon: '👁️', desc: '可透视对手手牌', price: 300, type: 'item', itemId: 'item_xray', count: 3 },
                { id: 'points_shield', name: '护盾卡×3', icon: '🛡️', desc: '免疫一次激怒', price: 250, type: 'item', itemId: 'item_shield', count: 3 },
                { id: 'points_skin_random', name: '随机皮肤箱', icon: '🎁', desc: '随机获得一款皮肤', price: 1000, type: 'random_skin' },
                { id: 'points_title', name: '专属称号', icon: '👑', desc: '积分达人称号', price: 2000, type: 'title' }
            ];
            
            grid.innerHTML = pointsItems.map(item => `
                <div class="shop-item">
                    <div class="item-image" style="background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(16,185,129,0.05));">
                        ${item.icon}
                    </div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${item.desc}</div>
                        <div class="item-footer">
                            <div class="price-section">
                                <span class="current-price" style="color: #10b981;">${item.price} 🏆</span>
                            </div>
                            <button class="buy-btn" onclick="exchangePointsItem('${item.id}', ${item.price})" 
                                    style="background: linear-gradient(45deg, #10b981, #059669);">
                                兑换
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // ==================== 渲染背包 ====================
        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            const ownedItems = shopInstance.getOwnedItems();
            
            if (ownedItems.length === 0) {
                grid.innerHTML = '<div style="grid-column: span 4; text-align: center; color: #666;">背包为空</div>';
                return;
            }
            
            grid.innerHTML = ownedItems.slice(0, 12).map(item => `
                <div class="inventory-item" title="${item.name}">${item.icon}</div>
            `).join('');
        }
        
        // ==================== 购买流程 ====================
        function openPurchaseModal(itemId) {
            const item = shopInstance.getItem(itemId);
            if (!item) return;
            
            currentItem = item;
            const discount = shopInstance.getDiscountInfo(itemId);
            const price = discount ? discount.discountPrice : item.price;
            
            document.getElementById('modalIcon').textContent = item.icon;
            document.getElementById('modalTitle').textContent = `购买 ${item.name}?`;
            document.getElementById('modalDesc').textContent = item.description;
            document.getElementById('modalPrice').textContent = `${price} ${item.currency === 'coin' ? '🪙' : '💎'}`;
            document.getElementById('purchaseModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('purchaseModal').classList.remove('active');
            currentItem = null;
        }
        
        function confirmPurchase() {
            if (!currentItem) return;
            
            const result = shopInstance.purchase(currentItem.id);
            
            if (result.success) {
                showToast(`✅ 成功购买 ${currentItem.name}!`);
                updateCurrencyDisplay();
                renderShop();
                renderInventory();
                
                // 埋点
                if (window.track) {
                    window.track('shop_purchase', {
                        item_id: currentItem.id,
                        item_name: currentItem.name,
                        price: result.purchase.price,
                        currency: currentItem.currency
                    });
                }
            } else {
                showToast(`❌ ${result.error}`);
            }
            
            closeModal();
        }
        
        // ==================== 积分兑换 ====================
        let userPoints = 2500;
        
        function exchangePointsItem(itemId, price) {
            if (userPoints < price) {
                showToast('❌ 积分不足!');
                return;
            }
            
            userPoints -= price;
            document.getElementById('pointsBalance').textContent = userPoints.toLocaleString();
            document.getElementById('userPoints').textContent = userPoints.toLocaleString();
            
            showToast('✅ 兑换成功!');
            
            // 埋点
            if (window.track) {
                window.track('points_exchange', { item_id: itemId, price: price });
            }
        }
        
        // ==================== 更新货币显示 ====================
        function updateCurrencyDisplay() {
            const balance = shopInstance.getBalance();
            document.getElementById('userCoins').textContent = balance.coins.toLocaleString();
            document.getElementById('userGems').textContent = balance.gems.toLocaleString();
        }
        
        // ==================== 倒计时 ====================
        function startCountdown() {
            let hours = 23, minutes = 59, seconds = 59;
            
            setInterval(() => {
                seconds--;
                if (seconds < 0) {
                    seconds = 59;
                    minutes--;
                    if (minutes < 0) {
                        minutes = 59;
                        hours--;
                        if (hours < 0) {
                            hours = 23;
                            // 重置折扣
                            if (shopInstance) {
                                shopInstance.refreshDiscounts();
                                renderShop();
                            }
                        }
                    }
                }
                
                document.getElementById('countdownH').textContent = String(hours).padStart(2, '0');
                document.getElementById('countdownM').textContent = String(minutes).padStart(2, '0');
                document.getElementById('countdownS').textContent = String(seconds).padStart(2, '0');
            }, 1000);
        }
        
        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 分类筛选
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    const category = this.dataset.category;
                    shopInstance.activeFilters.category = category;
                    renderShop();
                });
            });
            
            // 搜索
            document.getElementById('searchInput').addEventListener('input', function() {
                shopInstance.searchQuery = this.value;
                renderShop();
            });
            
            // 排序
            document.getElementById('sortSelect').addEventListener('change', function() {
                shopInstance.activeFilters.sortBy = this.value;
                renderShop();
            });
        }
        
        // ==================== 工具函数 ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
