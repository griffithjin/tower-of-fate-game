<!-- logo/tower-of-fate-logo.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="towerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- 光芒效果 -->
  <g id="rays" opacity="0.4">
    <line x1="256" y1="60" x2="180" y2="0" stroke="#FFD700" stroke-width="4" filter="url(#glow)"/>
    <line x1="256" y1="60" x2="256" y2="0" stroke="#FFD700" stroke-width="4" filter="url(#glow)"/>
    <line x1="256" y1="60" x2="332" y2="0" stroke="#FFD700" stroke-width="4" filter="url(#glow)"/>
    <line x1="256" y1="60" x2="380" y2="20" stroke="#FFD700" stroke-width="3" filter="url(#glow)"/>
    <line x1="256" y1="60" x2="132" y2="20" stroke="#FFD700" stroke-width="3" filter="url(#glow)"/>
    <line x1="256" y1="60" x2="412" y2="60" stroke="#FFD700" stroke-width="2" filter="url(#glow)"/>
    <line x1="256" y1="60" x2="100" y2="60" stroke="#FFD700" stroke-width="2" filter="url(#glow)"/>
  </g>
  
  <!-- 塔身 - 13层结构 -->
  <g id="tower">
    <!-- 底座 -->
    <polygon points="256,460 180,380 332,380" fill="#8B4513"/>
    <polygon points="256,460 200,400 312,400" fill="#A0522D"/>
    
    <!-- 第1-4层（下层） -->
    <rect x="175" y="340" width="162" height="40" fill="#CD853F" rx="5"/>
    <rect x="180" y="300" width="152" height="40" fill="#D2691E" rx="5"/>
    <rect x="185" y="260" width="142" height="40" fill="#CD853F" rx="5"/>
    <rect x="190" y="220" width="132" height="40" fill="#D2691E" rx="5"/>
    
    <!-- 第5-8层（中层） -->
    <rect x="195" y="180" width="122" height="40" fill="#A0522D" rx="5"/>
    <rect x="200" y="140" width="112" height="40" fill="#8B4513" rx="5"/>
    <rect x="205" y="100" width="102" height="40" fill="#A0522D" rx="5"/>
    <rect x="210" y="60" width="92" height="40" fill="#8B4513" rx="5"/>
    
    <!-- 第9-12层（上层-金色渐变） -->
    <rect x="218" y="35" width="76" height="25" fill="url(#towerGradient)" rx="3"/>
    <rect x="223" y="15" width="66" height="20" fill="url(#towerGradient)" rx="3"/>
    <rect x="228" y="0" width="56" height="15" fill="url(#towerGradient)" rx="3"/>
    
    <!-- 顶层A标志 -->
    <polygon points="256,0 228,-35 284,-35" fill="#FFD700" filter="url(#glow)"/>
    <text x="256" y="-12" font-family="Arial, sans-serif" font-size="22" font-weight="bold" 
          fill="#1A1A2E" text-anchor="middle">A</text>
  </g>
  
  <!-- 环绕卡牌 -->
  <g id="cards">
    <!-- 红桃 -->
    <g transform="translate(140, 180) rotate(-15)">
      <rect width="30" height="42" fill="#FF6B6B" rx="4" stroke="#FFFFFF" stroke-width="1"/>
      <text x="15" y="28" font-family="Arial" font-size="20" fill="white" text-anchor="middle">♥</text>
    </g>
    
    <!-- 黑桃 -->
    <g transform="translate(342, 180) rotate(15)">
      <rect width="30" height="42" fill="#2C3E50" rx="4" stroke="#FFFFFF" stroke-width="1"/>
      <text x="15" y="28" font-family="Arial" font-size="20" fill="white" text-anchor="middle">♠</text>
    </g>
    
    <!-- 方块 -->
    <g transform="translate(130, 280) rotate(-10)">
      <rect width="30" height="42" fill="#FFD93D" rx="4" stroke="#FFFFFF" stroke-width="1"/>
      <text x="15" y="28" font-family="Arial" font-size="20" fill="#1A1A2E" text-anchor="middle">♦</text>
    </g>
    
    <!-- 梅花 -->
    <g transform="translate(352, 280) rotate(10)">
      <rect width="30" height="42" fill="#6BCB77" rx="4" stroke="#FFFFFF" stroke-width="1"/>
      <text x="15" y="28" font-family="Arial" font-size="20" fill="white" text-anchor="middle">♣</text>
    </g>
  </g>
  
  <!-- 游戏名称 -->
  <text x="256" y="500" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#FFD700" text-anchor="middle" filter="url(#glow)">Tower of Fate</text>
</svg>
