<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付配置 | Fate Tower Admin</title>
  
  <!-- 自定义样式 -->
  <link rel="stylesheet" href="css/analytics.css">
  
  <style>
    /* 支付配置专用样式 */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .page-title {
      font-size: 24px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* 环境切换 */
    .env-switcher {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 15px 20px;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .env-label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .env-options {
      display: flex;
      gap: 10px;
    }

    .env-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-secondary);
    }

    .env-option:hover {
      border-color: var(--primary-color);
    }

    .env-option.active {
      background: rgba(84, 112, 198, 0.2);
      border-color: var(--primary-color);
      color: var(--text-primary);
    }

    .env-option input {
      display: none;
    }

    .env-radio {
      width: 16px;
      height: 16px;
      border: 2px solid var(--text-secondary);
      border-radius: 50%;
      position: relative;
    }

    .env-option.active .env-radio {
      border-color: var(--primary-color);
    }

    .env-option.active .env-radio::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: var(--primary-color);
      border-radius: 50%;
    }

    /* 配置卡片布局 */
    .config-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .config-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border-color);
    }

    .config-card.alipay {
      border-top: 3px solid #1677ff;
    }

    .config-card.wechat {
      border-top: 3px solid #07c160;
    }

    .config-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    .config-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .config-card.alipay .config-icon {
      background: rgba(22, 119, 255, 0.2);
    }

    .config-card.wechat .config-icon {
      background: rgba(7, 193, 96, 0.2);
    }

    .config-title {
      font-size: 16px;
      font-weight: 600;
    }

    .config-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* 表单样式 */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-label-required::after {
      content: '*';
      color: var(--danger-color);
      margin-left: 4px;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      background: rgba(255, 255, 255, 0.08);
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: rgba(160, 160, 160, 0.5);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }

    .form-input[type="password"] {
      font-family: 'Courier New', monospace;
    }

    /* 文件上传 */
    .file-upload {
      position: relative;
    }

    .file-input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .file-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .file-label:hover {
      border-color: var(--primary-color);
      background: rgba(255, 255, 255, 0.08);
    }

    .file-icon {
      font-size: 18px;
    }

    .file-text {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .file-name {
      color: var(--text-primary);
    }

    /* 开关样式 */
    .switch-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .switch-label {
      font-size: 14px;
    }

    .switch {
      position: relative;
      width: 48px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: 0.3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--success-color);
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    /* 按钮样式 */
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background: #4560b5;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-success {
      background: var(--success-color);
      color: white;
    }

    .btn-success:hover {
      background: #7bc769;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 测试状态 */
    .test-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
    }

    .test-status.success {
      background: rgba(145, 204, 117, 0.1);
      color: var(--success-color);
    }

    .test-status.warning {
      background: rgba(250, 200, 88, 0.1);
      color: var(--warning-color);
    }

    .test-status.error {
      background: rgba(238, 102, 102, 0.1);
      color: var(--danger-color);
    }

    /* 支付测试区域 */
    .test-section {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border-color);
    }

    .test-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .test-form {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .test-input-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .test-input {
      width: 100px;
      text-align: center;
    }

    .test-unit {
      color: var(--text-secondary);
    }

    /* 订单记录表格 */
    .orders-table-container {
      overflow-x: auto;
    }

    .orders-table {
      width: 100%;
      border-collapse: collapse;
    }

    .orders-table th,
    .orders-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .orders-table th {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .orders-table td {
      font-size: 14px;
    }

    .orders-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .status-badge.success {
      background: rgba(145, 204, 117, 0.2);
      color: var(--success-color);
    }

    .status-badge.failed {
      background: rgba(238, 102, 102, 0.2);
      color: var(--danger-color);
    }

    .status-badge.pending {
      background: rgba(250, 200, 88, 0.2);
      color: var(--warning-color);
    }

    /* 提示消息 */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease;
      z-index: 1000;
    }

    .toast.success {
      background: rgba(145, 204, 117, 0.9);
      color: white;
    }

    .toast.error {
      background: rgba(238, 102, 102, 0.9);
      color: white;
    }

    .toast.info {
      background: rgba(115, 192, 222, 0.9);
      color: white;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* 加载动画 */
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .config-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .test-form {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

  <script>
    // ========== AES加密工具 ==========
    const CryptoUtil = {
      // 生成随机密钥
      generateKey() {
        return Array.from(crypto.getRandomValues(new Uint8Array(32)))
          .map(b => b.toString(16).padStart(2, '0'))
          .join('');
      },

      // AES加密
      async encrypt(text, key) {
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        
        const keyBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(key));
        const cryptoKey = await crypto.subtle.importKey(
          'raw',
          keyBuffer,
          { name: 'AES-GCM' },
          false,
          ['encrypt']
        );

        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv },
          cryptoKey,
          data
        );

        const result = new Uint8Array(iv.length + encrypted.byteLength);
        result.set(iv);
        result.set(new Uint8Array(encrypted), iv.length);

        return btoa(String.fromCharCode(...result));
      },

      // AES解密
      async decrypt(encryptedBase64, key) {
        const encoder = new TextEncoder();
        const encrypted = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
        
        const iv = encrypted.slice(0, 12);
        const data = encrypted.slice(12);

        const keyBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(key));
        const cryptoKey = await crypto.subtle.importKey(
          'raw',
          keyBuffer,
          { name: 'AES-GCM' },
          false,
          ['decrypt']
        );

        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          cryptoKey,
          data
        );

        return new TextDecoder().decode(decrypted);
      }
    };

    // ========== 全局状态 ==========
    const state = {
      environment: 'sandbox',
      alipayConfig: null,
      wechatConfig: null,
      testOrders: [],
      encryptionKey: 'FateTower_Payment_Key_2024' // 实际使用时应从服务器获取
    };

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
      loadPaymentConfig();
      loadTestOrders();
      setupEventListeners();
    });

    function setupEventListeners() {
      // 文件上传监听
      document.getElementById('wechat-cert').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          document.getElementById('wechat-cert-text').innerHTML = 
            `<span class="file-name">📄 ${file.name}</span>`;
        }
      });
    }

    // ========== 环境切换 ==========
    function switchEnv(env) {
      state.environment = env;
      
      // 更新UI
      document.querySelectorAll('.env-option').forEach(el => {
        el.classList.remove('active');
      });
      event.currentTarget.classList.add('active');
      
      // 重新加载配置
      loadPaymentConfig();
      showToast('已切换到' + (env === 'sandbox' ? '沙箱' : '生产') + '环境', 'info');
    }

    // ========== 加载配置 ==========
    async function loadPaymentConfig() {
      try {
        const response = await fetch(`/api/admin/payment-config?environment=${state.environment}`);
        const data = await response.json();
        
        if (data.success) {
          state.alipayConfig = data.config.alipay;
          state.wechatConfig = data.config.wechat;
          
          // 填充表单
          fillAlipayForm(data.config.alipay);
          fillWechatForm(data.config.wechat);
          
          // 更新测试状态
          updateTestStatus('alipay', data.config.alipay.testStatus);
          updateTestStatus('wechat', data.config.wechat.testStatus);
        }
      } catch (error) {
        console.error('加载配置失败:', error);
        showToast('加载配置失败，请检查网络连接', 'error');
      }
    }

    function fillAlipayForm(config) {
      if (!config) return;
      
      document.getElementById('alipay-app-id').value = config.appId || '';
      document.getElementById('alipay-private-key').value = config.privateKey || '';
      document.getElementById('alipay-public-key').value = config.publicKey || '';
      document.getElementById('alipay-gateway').value = config.gateway || 'https://openapi.alipay.com/gateway.do';
      document.getElementById('alipay-notify-url').value = config.notifyUrl || '';
      document.getElementById('alipay-enabled').checked = config.enabled || false;
    }

    function fillWechatForm(config) {
      if (!config) return;
      
      document.getElementById('wechat-app-id').value = config.appId || '';
      document.getElementById('wechat-mch-id').value = config.mchId || '';
      document.getElementById('wechat-api-key').value = config.apiKey || '';
      document.getElementById('wechat-notify-url').value = config.notifyUrl || '';
      document.getElementById('wechat-enabled').checked = config.enabled || false;
      
      if (config.certPath) {
        document.getElementById('wechat-cert-text').innerHTML = 
          `<span class="file-name">📄 ${config.certPath.split('/').pop()}</span>`;
      }
    }

    // ========== 保存配置 ==========
    async function saveConfig(type) {
      const formData = type === 'alipay' ? getAlipayFormData() : getWechatFormData();
      
      // 表单验证
      if (!validateConfig(type, formData)) {
        return;
      }

      try {
        // 加密敏感数据
        const encryptedData = await encryptSensitiveData(type, formData);
        
        const payload = {
          environment: state.environment,
          [type]: encryptedData
        };

        const response = await fetch('/api/admin/payment-config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (result.success) {
          showToast(`${type === 'alipay' ? '支付宝' : '微信支付'}配置保存成功`, 'success');
          // 记录操作日志
          logOperation('SAVE_CONFIG', type);
        } else {
          showToast('保存失败: ' + result.message, 'error');
        }
      } catch (error) {
        console.error('保存配置失败:', error);
        showToast('保存配置失败，请重试', 'error');
      }
    }

    function getAlipayFormData() {
      return {
        appId: document.getElementById('alipay-app-id').value.trim(),
        privateKey: document.getElementById('alipay-private-key').value.trim(),
        publicKey: document.getElementById('alipay-public-key').value.trim(),
        gateway: document.getElementById('alipay-gateway').value.trim(),
        notifyUrl: document.getElementById('alipay-notify-url').value.trim(),
        enabled: document.getElementById('alipay-enabled').checked
      };
    }

    function getWechatFormData() {
      return {
        appId: document.getElementById('wechat-app-id').value.trim(),
        mchId: document.getElementById('wechat-mch-id').value.trim(),
        apiKey: document.getElementById('wechat-api-key').value.trim(),
        notifyUrl: document.getElementById('wechat-notify-url').value.trim(),
        enabled: document.getElementById('wechat-enabled').checked
      };
    }

    function validateConfig(type, data) {
      if (type === 'alipay') {
        if (!data.appId) {
          showToast('请输入支付宝应用ID', 'error');
          return false;
        }
        if (!data.privateKey) {
          showToast('请输入商户私钥', 'error');
          return false;
        }
        if (!data.publicKey) {
          showToast('请输入支付宝公钥', 'error');
          return false;
        }
      } else {
        if (!data.appId) {
          showToast('请输入微信应用ID', 'error');
          return false;
        }
        if (!data.mchId) {
          showToast('请输入微信商户号', 'error');
          return false;
        }
        if (!data.apiKey) {
          showToast('请输入API密钥', 'error');
          return false;
        }
      }
      return true;
    }

    async function encryptSensitiveData(type, data) {
      const encrypted = { ...data };
      
      if (type === 'alipay') {
        encrypted.privateKey = await CryptoUtil.encrypt(data.privateKey, state.encryptionKey);
        encrypted.publicKey = await CryptoUtil.encrypt(data.publicKey, state.encryptionKey);
      } else {
        encrypted.apiKey = await CryptoUtil.encrypt(data.apiKey, state.encryptionKey);
      }
      
      return encrypted;
    }

    // ========== 测试连接 ==========
    async function testConnection(type) {
      const btn = event.target.closest('.btn');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="loading"></span> 测试中...';
      btn.disabled = true;

      try {
        const response = await fetch('/api/admin/payment-config/test', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            type, 
            environment: state.environment 
          })
        });

        const result = await response.json();
        
        if (result.success) {
          updateTestStatus(type, 'success');
          showToast(`${type === 'alipay' ? '支付宝' : '微信支付'}连接测试通过`, 'success');
        } else {
          updateTestStatus(type, 'error', result.message);
          showToast(`连接测试失败: ${result.message}`, 'error');
        }
      } catch (error) {
        updateTestStatus(type, 'error', '网络错误');
        showToast('测试连接失败，请检查网络', 'error');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    function updateTestStatus(type, status, message) {
      const statusEl = document.getElementById(`${type}-test-status`);
      
      const statusMap = {
        success: { icon: '✅', text: '通过', class: 'success' },
        error: { icon: '❌', text: message || '失败', class: 'error' },
        warning: { icon: '⚠️', text: '未测试', class: 'warning' }
      };

      const info = statusMap[status] || statusMap.warning;
      statusEl.className = `test-status ${info.class}`;
      statusEl.innerHTML = `<span>${info.icon}</span><span>${info.text}</span>`;
    }

    // ========== 支付测试 ==========
    async function initiateTestPayment() {
      const amount = parseFloat(document.getElementById('test-amount').value);
      
      if (!amount || amount <= 0) {
        showToast('请输入有效的测试金额', 'error');
        return;
      }

      // 选择支付类型
      const type = confirm('点击"确定"使用支付宝测试，"取消"使用微信支付测试') ? 'alipay' : 'wechat';

      try {
        const response = await fetch('/api/admin/payment-config/test-pay', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount,
            type,
            environment: state.environment
          })
        });

        const result = await response.json();
        
        if (result.success) {
          showToast('测试订单创建成功，正在跳转支付页面...', 'success');
          
          // 添加测试订单记录
          addTestOrder({
            orderId: result.orderId,
            type,
            amount,
            status: 'pending',
            time: new Date().toLocaleTimeString()
          });

          // 打开支付页面
          if (result.paymentUrl) {
            window.open(result.paymentUrl, '_blank');
          }
          
          // 记录操作日志
          logOperation('TEST_PAYMENT', type, { amount });
        } else {
          showToast('创建测试订单失败: ' + result.message, 'error');
        }
      } catch (error) {
        console.error('测试支付失败:', error);
        showToast('测试支付失败，请重试', 'error');
      }
    }

    function addTestOrder(order) {
      state.testOrders.unshift(order);
      renderTestOrders();
    }

    function renderTestOrders() {
      const tbody = document.querySelector('#test-orders-table tbody');
      
      if (state.testOrders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-secondary);">暂无测试记录</td></tr>';
        return;
      }

      tbody.innerHTML = state.testOrders.map(order => `
        <tr>
          <td>${order.orderId}</td>
          <td>${order.type === 'alipay' ? '支付宝' : '微信支付'}</td>
          <td>¥${order.amount.toFixed(2)}</td>
          <td>
            <span class="status-badge ${order.status}">
              ${order.status === 'success' ? '✅ 成功' : order.status === 'failed' ? '❌ 失败' : '⏳ 处理中'}
            </span>
          </td>
          <td>${order.time}</td>
          <td>
            <button class="btn btn-secondary" style="padding: 5px 10px; font-size: 12px;" onclick="checkOrderStatus('${order.orderId}')">
              查询状态
            </button>
          </td>
        </tr>
      `).join('');
    }

    async function checkOrderStatus(orderId) {
      try {
        const response = await fetch(`/api/admin/payment-config/test-orders/${orderId}`);
        const result = await response.json();
        
        if (result.success) {
          // 更新订单状态
          const order = state.testOrders.find(o => o.orderId === orderId);
          if (order) {
            order.status = result.status;
            renderTestOrders();
          }
          
          showToast(`订单状态: ${result.status === 'success' ? '支付成功' : result.status === 'failed' ? '支付失败' : '等待支付'}`, 'info');
        }
      } catch (error) {
        showToast('查询订单状态失败', 'error');
      }
    }

    async function loadTestOrders() {
      try {
        const response = await fetch('/api/admin/payment-config/test-orders');
        const result = await response.json();
        
        if (result.success && result.orders) {
          state.testOrders = result.orders;
          renderTestOrders();
        }
      } catch (error) {
        console.error('加载测试订单失败:', error);
      }
    }

    // ========== 工具函数 ==========
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const iconMap = {
        success: '✅',
        error: '❌',
        info: 'ℹ️'
      };
      
      toast.innerHTML = `<span>${iconMap[type]}</span><span>${message}</span>`;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    async function logOperation(action, target, details = {}) {
      try {
        await fetch('/api/admin/operation-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action,
            target,
            details,
            timestamp: new Date().toISOString(),
            user: 'admin'
          })
        });
      } catch (error) {
        console.error('记录操作日志失败:', error);
      }
    }
  </script>
</body>
</html>
