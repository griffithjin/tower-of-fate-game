<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 命运塔多语言管理系统 | Tower of Fate i18n Manager</title>
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        header p {
            color: #888;
            font-size: 1.1rem;
        }
        
        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(243, 156, 18, 0.2);
        }
        
        .stat-value {
            font-size: 3rem;
            font-weight: bold;
            color: #f39c12;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.9rem;
        }
        
        /* Language Completion */
        .lang-completion {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .lang-completion h3 {
            margin-bottom: 25px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .progress-item {
            margin-bottom: 20px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        
        .progress-fill.complete {
            background: linear-gradient(90deg, #27ae60, #2ecc71);
        }
        
        /* Editor Section */
        .editor-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .editor-header h3 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .search-box input {
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            color: #fff;
            min-width: 250px;
        }
        
        .search-box input::placeholder {
            color: #666;
        }
        
        .search-box select {
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        
        /* Translation Table */
        .translation-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        .translation-table th,
        .translation-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .translation-table th {
            background: rgba(243, 156, 18, 0.1);
            font-weight: 600;
            color: #f39c12;
        }
        
        .translation-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .translation-table input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
        }
        
        .translation-table input:focus {
            outline: none;
            border-color: #f39c12;
        }
        
        .key-cell {
            font-family: 'Courier New', monospace;
            color: #888;
            font-size: 0.85rem;
        }
        
        /* Actions */
        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: #fff;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(243, 156, 18, 0.3);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal-header {
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            font-size: 1.3rem;
        }
        
        .modal-body {
            margin-bottom: 20px;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            background: #27ae60;
            color: #fff;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transform: translateX(150%);
            transition: transform 0.3s;
            z-index: 2000;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.error {
            background: #e74c3c;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-value {
                font-size: 2rem;
            }
            
            .translation-table {
                font-size: 0.8rem;
            }
            
            .translation-table th,
            .translation-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🌐 命运塔多语言管理系统</h1>
            <p>Tower of Fate Internationalization Management System</p>
        </header>
        
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="totalLanguages">15</div>
                <div class="stat-label">支持语言</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalKeys">0</div>
                <div class="stat-label">翻译条目</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgCompletion">0%</div>
                <div class="stat-label">平均完成度</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lastUpdated">-</div>
                <div class="stat-label">最后更新</div>
            </div>
        </div>
        
        <!-- Language Completion -->
        <div class="lang-completion">
            <h3>📊 翻译完成度</h3>
            <div id="completionBars">
                <!-- Generated by JS -->
            </div>
        </div>
        
        <!-- Editor -->
        <div class="editor-section">
            <div class="editor-header">
                <h3>📝 翻译编辑器</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索翻译键...">
                    <select id="filterLocale">
                        <option value="all">所有语言</option>
                        <option value="zh-CN">🇨🇳 简体中文</option>
                        <option value="en-US">🇺🇸 English</option>
                        <option value="ja-JP">🇯🇵 日本語</option>
                        <option value="ko-KR">🇰🇷 한국어</option>
                        <option value="de-DE">🇩🇪 Deutsch</option>
                        <option value="fr-FR">🇫🇷 Français</option>
                        <option value="es-ES">🇪🇸 Español</option>
                        <option value="pt-BR">🇧🇷 Português</option>
                        <option value="ru-RU">🇷🇺 Русский</option>
                        <option value="ar-SA">🇸🇦 العربية</option>
                        <option value="hi-IN">🇮🇳 हिन्दी</option>
                        <option value="th-TH">🇹🇭 ไทย</option>
                        <option value="vi-VN">🇻🇳 Tiếng Việt</option>
                        <option value="id-ID">🇮🇩 Bahasa Indonesia</option>
                        <option value="tr-TR">🇹🇷 Türkçe</option>
                    </select>
                </div>
            </div>
            
            <table class="translation-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">Key</th>
                        <th style="width: 20%;">🇨🇳 中文</th>
                        <th style="width: 20%;">🇺🇸 English</th>
                        <th style="width: 20%;">🇯🇵 日本語</th>
                        <th style="width: 20%;">操作</th>
                    </tr>
                </thead>
                <tbody id="translationTableBody">
                    <!-- Generated by JS -->
                </tbody>
            </table>
        </div>
        
        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-secondary" onclick="i18nManager.batchImport()">
                📥 批量导入
            </button>
            <button class="btn btn-secondary" onclick="i18nManager.exportAll()">
                📤 导出全部
            </button>
            <button class="btn btn-secondary" onclick="i18nManager.previewLang()">
                👁️ 预览
            </button>
            <button class="btn btn-primary" onclick="i18nManager.saveAll()">
                💾 保存所有更改
            </button>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script src="js/i18n-manager.js"></script>
</body>
</html>
