<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运塔后台 - 锦标赛管理（增强版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: linear-gradient(90deg, #1a1a3e 0%, #2d1b69 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            color: #888;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #ffd700;
            background: rgba(255,215,0,0.1);
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255,215,0,0.3);
        }
        .stat-value { font-size: 2em; color: #ffd700; font-weight: bold; }
        .stat-label { color: #888; font-size: 0.9em; margin-top: 5px; }
        
        .section {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.2) 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.3em;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        .btn-danger {
            background: rgba(255,0,0,0.3);
            color: #ff6b6b;
            border: 1px solid rgba(255,0,0,0.5);
        }
        .btn-sm { padding: 6px 12px; font-size: 0.85em; }
        
        .tournament-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        
        .tournament-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .tournament-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255,215,0,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .tournament-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
        }
        
        .tournament-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .type-global { background: linear-gradient(45deg, #ff6b6b, #ff8e53); }
        .type-country { background: linear-gradient(45deg, #ffd700, #ffaa00); color: #000; }
        .type-friends { background: linear-gradient(45deg, #4bc0c0, #36a2eb); }
        .type-limited { background: linear-gradient(45deg, #9966ff, #ff9f40); }
        
        .tournament-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .tower-preview {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }
        .tower-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }
        .tower-preview .tower-placeholder {
            color: #666;
            font-size: 2em;
        }
        .tower-preview .tower-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            font-size: 0.85em;
            color: #ffd700;
        }
        
        .association-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .association-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 0.9em;
        }
        .association-item i {
            font-style: normal;
            width: 24px;
            text-align: center;
        }
        .association-item .label { color: #888; }
        .association-item .value { color: #ffd700; font-weight: bold; }
        
        .tournament-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .tournament-actions .btn { flex: 1; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
        }
        .status-draft { background: rgba(128,128,128,0.3); color: #888; }
        .status-registering { background: rgba(0,255,0,0.2); color: #0f0; }
        .status-active { background: rgba(255,215,0,0.2); color: #ffd700; }
        .status-ended { background: rgba(255,0,0,0.2); color: #ff6b6b; }
        
        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: linear-gradient(135deg, #1a1a3e 0%, #0d1b2a 100%);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .modal-title {
            font-size: 1.5em;
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            color: #888;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #ffd700;
        }
        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .association-panel {
            background: rgba(255,215,0,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        .association-panel h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .preview-box {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(255,255,255,0.2);
        }
        .preview-box img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
        }
        .preview-box .empty-text {
            color: #666;
            font-style: italic;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .modal-actions .btn { flex: 1; }
        
        .batch-panel {
            background: rgba(0,200,255,0.05);
            border: 1px solid rgba(0,200,255,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .batch-panel h3 {
            color: #00c8ff;
            margin-bottom: 15px;
        }
        
        .country-select-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .country-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .country-option:hover {
            background: rgba(255,215,0,0.1);
        }
        .country-option input[type="checkbox"] {
            width: 18px; height: 18px;
            accent-color: #ffd700;
        }
        .country-option.selected {
            background: rgba(255,215,0,0.2);
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state i { font-size: 4em; margin-bottom: 20px; display: block; }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; padding: 15px; }
            .header h1 { font-size: 1.4em; }
            .container { padding: 15px; }
            .tournament-grid { grid-template-columns: 1fr; }
            .association-info { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 锦标赛管理（增强版）</h1>
        <div class="nav-links">
            <a href="index.html">仪表盘</a>
            <a href="tournament-enhanced.html" class="active">锦标赛</a>
            <a href="postcard-manager.html">明信片</a>
            <a href="asset-manager.html">资源</a>
        </div>
    </div>
    
    <div class="container">
        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="totalTournaments">0</div>
                <div class="stat-label">锦标赛总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeTournaments">0</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="registeredTowers">0</div>
                <div class="stat-label">已关联塔</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCountries">0</div>
                <div class="stat-label">覆盖国家</div>
            </div>
        </div>
        
        <!-- 锦标赛列表 -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">
                    🏆 锦标赛列表
                </div>
                <div>
                    <button class="btn btn-secondary btn-sm" onclick="showBatchModal()">📦 批量创建</button>
                    <button class="btn btn-primary" onclick="showCreateModal()">+ 新建锦标赛</button>
                </div>
            </div>
            <div class="tournament-grid" id="tournamentList"></div>
        </div>
    </div>
    
    <!-- 创建/编辑锦标赛模态框 -->
    <div class="modal-overlay" id="tournamentModal">
        <div class="modal">
            <div class="modal-title" id="modalTitle">创建锦标赛</div>
            <form id="tournamentForm">
                <input type="hidden" id="tournamentId">
                
                <div class="form-group">
                    <label class="form-label">锦标赛名称</label>
                    <input type="text" class="form-input" id="tournamentName" placeholder="例如：中国锦标赛" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">类型</label>
                    <select class="form-select" id="tournamentType">
                        <option value="global">🌍 全球锦标赛</option>
                        <option value="country">🇨🇳 国家锦标赛</option>
                        <option value="friends">👥 好友锦标赛</option>
                        <option value="limited">⚡ 限时锦标赛</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" id="tournamentDesc" placeholder="锦标赛描述..."></textarea>
                </div>
                
                <!-- 关联配置面板 -->
                <div class="association-panel">
                    <h3>🔗 关联配置</h3>
                    
                    <div class="form-group">
                        <label class="form-label">关联塔 (Tower)</label>
                        <select class="form-select" id="towerSelect" onchange="updateTowerPreview()">
                            <option value="">-- 选择塔 --</option>
                        </select>
                        <div class="preview-box" id="towerPreview">
                            <span class="empty-text">选择塔后预览</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">关联国家</label>
                        <select class="form-select" id="countrySelect">
                            <option value="">-- 选择国家 --</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">关联明信片</label>
                        <select class="form-select" id="postcardSelect">
                            <option value="">-- 选择明信片 --</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">报名时间</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="datetime-local" class="form-input" id="regStart">
                        <input type="datetime-local" class="form-input" id="regEnd">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">比赛时间</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="datetime-local" class="form-input" id="tourStart">
                        <input type="datetime-local" class="form-input" id="tourEnd">
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('tournamentModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 批量创建模态框 -->
    <div class="modal-overlay" id="batchModal">
        <div class="modal">
            <div class="modal-title">📦 批量创建锦标赛</div>
            <div class="batch-panel">
                <h3>选择国家</h3>
                <p style="color: #888; font-size: 0.9em; margin-bottom: 15px;">将为每个选中的国家创建一个锦标赛</p>
                <div class="country-select-grid" id="countryGrid"></div>
            </div>
            
            <div class="form-group" style="margin-top: 20px;">
                <label class="form-label">基础命名模板</label>
                <input type="text" class="form-input" id="batchNameTemplate" value="{country}锦标赛" placeholder="使用 {country} 作为国家名占位符">
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('batchModal')">取消</button>
                <button class="btn btn-primary" onclick="confirmBatchCreate()">确认创建</button>
            </div>
        </div>
    </div>

    <script>
// ==================== 数据存储 ====================
let tournaments = JSON.parse(localStorage.getItem('ft_tournaments')) || [];
let towers = JSON.parse(localStorage.getItem('ft_towers')) || [];
let postcards = JSON.parse(localStorage.getItem('ft_postcards')) || [];
let countries = [
    { code: 'CN', name: '中国', flag: '🇨🇳' },
    { code: 'US', name: '美国', flag: '🇺🇸' },
    { code: 'JP', name: '日本', flag: '🇯🇵' },
    { code: 'GB', name: '英国', flag: '🇬🇧' },
    { code: 'FR', name: '法国', flag: '🇫🇷' },
    { code: 'DE', name: '德国', flag: '🇩🇪' },
    { code: 'IT', name: '意大利', flag: '🇮🇹' },
    { code: 'ES', name: '西班牙', flag: '🇪🇸' },
    { code: 'RU', name: '俄罗斯', flag: '🇷🇺' },
    { code: 'BR', name: '巴西', flag: '🇧🇷' },
    { code: 'IN', name: '印度', flag: '🇮🇳' },
    { code: 'AU', name: '澳大利亚', flag: '🇦🇺' },
    { code: 'CA', name: '加拿大', flag: '🇨🇦' },
    { code: 'KR', name: '韩国', flag: '🇰🇷' },
    { code: 'MX', name: '墨西哥', flag: '🇲🇽' }
];

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', () => {
    initMockData();
    loadData();
    renderTournaments();
    updateStats();
    populateSelects();
    renderCountryGrid();
});

function initMockData() {
    // 初始化塔数据
    if (towers.length === 0) {
        towers = [
            { id: 'oriental-pearl', name: '东方明珠', country: 'CN', image: 'towers/oriental-pearl.png', desc: '上海地标，468米高塔' },
            { id: 'empire-state', name: '帝国大厦', country: 'US', image: 'towers/empire-state.png', desc: '纽约地标，381米高' },
            { id: 'tokyo-tower', name: '东京塔', country: 'JP', image: 'towers/tokyo-tower.png', desc: '东京地标，333米高' },
            { id: 'big-ben', name: '大本钟', country: 'GB', image: 'towers/big-ben.png', desc: '伦敦地标，96米高' },
            { id: 'eiffel', name: '埃菲尔铁塔', country: 'FR', image: 'towers/eiffel.png', desc: '巴黎地标，330米高' },
            { id: 'brandenburg', name: '勃兰登堡门', country: 'DE', image: 'towers/brandenburg.png', desc: '柏林地标' },
            { id: 'colosseum', name: '罗马斗兽场', country: 'IT', image: 'towers/colosseum.png', desc: '罗马地标' },
            { id: 'sagrada', name: '圣家堂', country: 'ES', image: 'towers/sagrada.png', desc: '巴塞罗那地标' }
        ];
        localStorage.setItem('ft_towers', JSON.stringify(towers));
    }
    
    // 初始化明信片数据
    if (postcards.length === 0) {
        postcards = [
            { id: 'postcard_cn_001', name: '东方明珠明信片', country: 'CN', image: 'postcards/cn.png', rarity: 'legendary' },
            { id: 'postcard_us_001', name: '自由女神明信片', country: 'US', image: 'postcards/us.png', rarity: 'epic' },
            { id: 'postcard_jp_001', name: '富士山明信片', country: 'JP', image: 'postcards/jp.png', rarity: 'epic' },
            { id: 'postcard_gb_001', name: '大本钟明信片', country: 'GB', image: 'postcards/gb.png', rarity: 'rare' },
            { id: 'postcard_fr_001', name: '埃菲尔铁塔明信片', country: 'FR', image: 'postcards/fr.png', rarity: 'epic' }
        ];
        localStorage.setItem('ft_postcards', JSON.stringify(postcards));
    }
    
    // 初始化锦标赛数据
    if (tournaments.length === 0) {
        const now = new Date();
        tournaments = [
            {
                id: 'tournament_001',
                name: '中国锦标赛',
                type: 'country',
                description: '中国区顶尖玩家对决，为国争光！',
                towerId: 'oriental-pearl',
                countryCode: 'CN',
                postcardId: 'postcard_cn_001',
                status: 'registering',
                registrationStart: new Date(now.getTime() - 2 * 24 * 60 * 60 * 1000).toISOString(),
                registrationEnd: new Date(now.getTime() + 1 * 24 * 60 * 60 * 1000).toISOString(),
                tournamentStart: new Date(now.getTime() + 1 * 24 * 60 * 60 * 1000).toISOString(),
                tournamentEnd: new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString()
            },
            {
                id: 'tournament_002',
                name: '命运塔全球争霸赛',
                type: 'global',
                description: '与全球玩家一决高下！',
                towerId: '',
                countryCode: '',
                postcardId: '',
                status: 'upcoming',
                registrationStart: new Date(now.getTime() + 1 * 24 * 60 * 60 * 1000).toISOString(),
                registrationEnd: new Date(now.getTime() + 3 * 24 * 60 * 60 * 1000).toISOString(),
                tournamentStart: new Date(now.getTime() + 3 * 24 * 60 * 60 * 1000).toISOString(),
                tournamentEnd: new Date(now.getTime() + 10 * 24 * 60 * 60 * 1000).toISOString()
            }
        ];
        saveData();
    }
}

function loadData() {
    tournaments = JSON.parse(localStorage.getItem('ft_tournaments')) || [];
    towers = JSON.parse(localStorage.getItem('ft_towers')) || [];
    postcards = JSON.parse(localStorage.getItem('ft_postcards')) || [];
}

function saveData() {
    localStorage.setItem('ft_tournaments', JSON.stringify(tournaments));
    localStorage.setItem('ft_towers', JSON.stringify(towers));
    localStorage.setItem('ft_postcards', JSON.stringify(postcards));
}

// ==================== 渲染 ====================
function renderTournaments() {
    const container = document.getElementById('tournamentList');
    if (tournaments.length === 0) {
        container.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
                <span>🏆</span>
                <p>暂无锦标赛</p>
                <p style="font-size: 0.9em; margin-top: 10px;">点击"新建锦标赛"创建第一个</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = tournaments.map(t => {
        const tower = towers.find(tw => tw.id === t.towerId);
        const country = countries.find(c => c.code === t.countryCode);
        const postcard = postcards.find(p => p.id === t.postcardId);
        const typeNames = { global: '🌍 全球', country: '🇨🇳 国家', friends: '👥 好友', limited: '⚡ 限时' };
        const statusNames = { draft: '草稿', registering: '报名中', upcoming: '即将开始', active: '进行中', ended: '已结束' };
        
        return `
            <div class="tournament-card">
                <span class="tournament-type type-${t.type}">${typeNames[t.type]}</span>
                <div class="tournament-name">${t.name}</div>
                
                <div class="tower-preview">
                    ${tower ? `
                        <img src="${tower.image}" alt="${tower.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\\'tower-placeholder\\'>🏰</span>';">
                        <div class="tower-overlay">${tower.name}</div>
                    ` : '<span class="tower-placeholder">🏰 未关联塔</span>'}
                </div>
                
                <div class="association-info">
                    <div class="association-item">
                        <i>🗼</i>
                        <span class="label">塔:</span>
                        <span class="value">${tower ? tower.name : '未设置'}</span>
                    </div>
                    <div class="association-item">
                        <i>${country ? country.flag : '🌐'}</i>
                        <span class="label">国家:</span>
                        <span class="value">${country ? country.name : '未设置'}</span>
                    </div>
                    <div class="association-item">
                        <i>🎴</i>
                        <span class="label">明信片:</span>
                        <span class="value">${postcard ? postcard.name : '未设置'}</span>
                    </div>
                    <div class="association-item">
                        <i>📊</i>
                        <span class="label">状态:</span>
                        <span class="status-badge status-${t.status}">${statusNames[t.status] || t.status}</span>
                    </div>
                </div>
                
                <div class="tournament-actions">
                    <button class="btn btn-secondary btn-sm" onclick="editTournament('${t.id}')">编辑</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteTournament('${t.id}')">删除</button>
                </div>
            </div>
        `;
    }).join('');
}

function updateStats() {
    document.getElementById('totalTournaments').textContent = tournaments.length;
    document.getElementById('activeTournaments').textContent = tournaments.filter(t => ['registering', 'active'].includes(t.status)).length;
    document.getElementById('registeredTowers').textContent = new Set(tournaments.filter(t => t.towerId).map(t => t.towerId)).size;
    document.getElementById('totalCountries').textContent = new Set(tournaments.filter(t => t.countryCode).map(t => t.countryCode)).size;
}

function populateSelects() {
    const towerSelect = document.getElementById('towerSelect');
    towerSelect.innerHTML = '<option value="">-- 选择塔 --</option>' + 
        towers.map(t => `<option value="${t.id}">${t.name} (${t.country})</option>`).join('');
    
    const countrySelect = document.getElementById('countrySelect');
    countrySelect.innerHTML = '<option value="">-- 选择国家 --</option>' + 
        countries.map(c => `<option value="${c.code}">${c.flag} ${c.name}</option>`).join('');
    
    const postcardSelect = document.getElementById('postcardSelect');
    postcardSelect.innerHTML = '<option value="">-- 选择明信片 --</option>' + 
        postcards.map(p => `<option value="${p.id}">${p.name} [${p.rarity}]</option>`).join('');
}

function renderCountryGrid() {
    const grid = document.getElementById('countryGrid');
    grid.innerHTML = countries.map(c => `
        <div class="country-option" onclick="toggleCountry(this, '${c.code}')">
            <input type="checkbox" value="${c.code}" onchange="event.stopPropagation()">
            <span>${c.flag} ${c.name}</span>
        </div>
    `).join('');
}

// ==================== 模态框操作 ====================
function showCreateModal() {
    document.getElementById('tournamentForm').reset();
    document.getElementById('tournamentId').value = '';
    document.getElementById('modalTitle').textContent = '创建锦标赛';
    document.getElementById('towerPreview').innerHTML = '<span class="empty-text">选择塔后预览</span>';
    
    // 设置默认时间
    const now = new Date();
    const tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
    document.getElementById('regStart').value = now.toISOString().slice(0, 16);
    document.getElementById('regEnd').value = tomorrow.toISOString().slice(0, 16);
    document.getElementById('tourStart').value = tomorrow.toISOString().slice(0, 16);
    document.getElementById('tourEnd').value = new Date(tomorrow.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 16);
    
    openModal('tournamentModal');
}

function editTournament(id) {
    const t = tournaments.find(x => x.id === id);
    if (!t) return;
    
    document.getElementById('tournamentId').value = t.id;
    document.getElementById('tournamentName').value = t.name;
    document.getElementById('tournamentType').value = t.type;
    document.getElementById('tournamentDesc').value = t.description || '';
    document.getElementById('towerSelect').value = t.towerId || '';
    document.getElementById('countrySelect').value = t.countryCode || '';
    document.getElementById('postcardSelect').value = t.postcardId || '';
    document.getElementById('regStart').value = t.registrationStart ? t.registrationStart.slice(0, 16) : '';
    document.getElementById('regEnd').value = t.registrationEnd ? t.registrationEnd.slice(0, 16) : '';
    document.getElementById('tourStart').value = t.tournamentStart ? t.tournamentStart.slice(0, 16) : '';
    document.getElementById('tourEnd').value = t.tournamentEnd ? t.tournamentEnd.slice(0, 16) : '';
    
    updateTowerPreview();
    document.getElementById('modalTitle').textContent = '编辑锦标赛';
    openModal('tournamentModal');
}

function showBatchModal() {
    document.getElementById('batchNameTemplate').value = '{country}锦标赛';
    renderCountryGrid();
    openModal('batchModal');
}

function openModal(id) {
    document.getElementById(id).classList.add('active');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}

// ==================== 表单处理 ====================
document.getElementById('tournamentForm').addEventListener('submit', function(e) {
    e.preventDefault();
    saveTournament();
});

function saveTournament() {
    const id = document.getElementById('tournamentId').value;
    const data = {
        id: id || 'tournament_' + Date.now(),
        name: document.getElementById('tournamentName').value,
        type: document.getElementById('tournamentType').value,
        description: document.getElementById('tournamentDesc').value,
        towerId: document.getElementById('towerSelect').value,
        countryCode: document.getElementById('countrySelect').value,
        postcardId: document.getElementById('postcardSelect').value,
        registrationStart: document.getElementById('regStart').value,
        registrationEnd: document.getElementById('regEnd').value,
        tournamentStart: document.getElementById('tourStart').value,
        tournamentEnd: document.getElementById('tourEnd').value,
        status: 'registering'
    };
    
    if (id) {
        const idx = tournaments.findIndex(t => t.id === id);
        if (idx >= 0) tournaments[idx] = data;
    } else {
        tournaments.push(data);
    }
    
    saveData();
    renderTournaments();
    updateStats();
    closeModal('tournamentModal');
    showToast('锦标赛已保存');
}

function deleteTournament(id) {
    if (!confirm('确定要删除这个锦标赛吗？')) return;
    tournaments = tournaments.filter(t => t.id !== id);
    saveData();
    renderTournaments();
    updateStats();
    showToast('锦标赛已删除');
}

function confirmBatchCreate() {
    const template = document.getElementById('batchNameTemplate').value || '{country}锦标赛';
    const selectedCountries = Array.from(document.querySelectorAll('#countryGrid input:checked')).map(cb => cb.value);
    
    if (selectedCountries.length === 0) {
        alert('请至少选择一个国家');
        return;
    }
    
    const now = new Date();
    selectedCountries.forEach(code => {
        const country = countries.find(c => c.code === code);
        const tower = towers.find(t => t.country === code);
        const postcard = postcards.find(p => p.country === code);
        
        tournaments.push({
            id: 'tournament_' + Date.now() + '_' + code,
            name: template.replace('{country}', country.name),
            type: 'country',
            description: `${country.name}区顶尖玩家对决，为国争光！`,
            towerId: tower ? tower.id : '',
            countryCode: code,
            postcardId: postcard ? postcard.id : '',
            status: 'draft',
            registrationStart: new Date(now.getTime() + 24 * 60 * 60 * 1000).toISOString(),
            registrationEnd: new Date(now.getTime() + 3 * 24 * 60 * 60 * 1000).toISOString(),
            tournamentStart: new Date(now.getTime() + 3 * 24 * 60 * 60 * 1000).toISOString(),
            tournamentEnd: new Date(now.getTime() + 10 * 24 * 60 * 60 * 1000).toISOString()
        });
    });
    
    saveData();
    renderTournaments();
    updateStats();
    closeModal('batchModal');
    showToast(`成功创建 ${selectedCountries.length} 个锦标赛`);
}

// ==================== 辅助功能 ====================
function updateTowerPreview() {
    const towerId = document.getElementById('towerSelect').value;
    const preview = document.getElementById('towerPreview');
    
    if (!towerId) {
        preview.innerHTML = '<span class="empty-text">选择塔后预览</span>';
        return;
    }
    
    const tower = towers.find(t => t.id === towerId);
    if (tower) {
        preview.innerHTML = `
            <img src="${tower.image}" alt="${tower.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\\'text-align:center\\'><span style=\\'font-size:2em\\'>🏰</span><br><span>${tower.name}</span></div>';">
        `;
    }
}

function toggleCountry(el, code) {
    const checkbox = el.querySelector('input[type="checkbox"]');
    checkbox.checked = !checkbox.checked;
    el.classList.toggle('selected', checkbox.checked);
}

function showToast(message) {
    const toast = document.createElement('div');
    toast.style.cssText = `
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: linear-gradient(45deg, #ffd700, #ffaa00);
        color: #000; padding: 15px 30px; border-radius: 10px;
        font-weight: bold; z-index: 9999; animation: fadeInUp 0.3s;
    `;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
    </script>
