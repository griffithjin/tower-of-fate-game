<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📢 命运塔广告管理系统 Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        /* 头部导航 */
        .admin-header {
            background: linear-gradient(135deg, var(--bg-card) 0%, #252f47 100%);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .admin-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .admin-logo .icon {
            font-size: 1.5rem;
        }
        
        .admin-nav {
            display: flex;
            gap: 0.5rem;
        }
        
        .nav-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .admin-main {
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .stat-card.primary { border-left: 4px solid var(--primary); }
        .stat-card.success { border-left: 4px solid var(--success); }
        .stat-card.warning { border-left: 4px solid var(--warning); }
        .stat-card.info { border-left: 4px solid var(--info); }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .stat-icon.primary { background: rgba(99, 102, 241, 0.2); }
        .stat-icon.success { background: rgba(16, 185, 129, 0.2); }
        .stat-icon.warning { background: rgba(245, 158, 11, 0.2); }
        .stat-icon.info { background: rgba(59, 130, 246, 0.2); }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        /* 面板 */
        .panel {
            background: var(--bg-card);
            border-radius: 1rem;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            overflow: hidden;
        }
        
        .panel-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .panel-body {
            padding: 1.5rem;
        }
        
        /* 按钮 */
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover { background: var(--primary-dark); }
        
        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover { background: #475569; }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.8rem;
        }
        
        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th, .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .data-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .data-table tr:hover {
            background: var(--bg-hover);
        }
        
        /* 开关 */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-hover);
            transition: 0.3s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: var(--success);
        }
        
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        
        /* 标签 */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--bg-hover);
            color: var(--text-secondary);
        }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 2rem;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--bg-card);
            border-radius: 1rem;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 1100px;
            max-height: 90vh;
            overflow: hidden;
            animation: modalSlide 0.3s ease;
        }
        
        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .modal-close:hover { color: var(--text-primary); }
        
        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            max-height: calc(90vh - 140px);
        }
        
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        
        /* 表单 */
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .form-hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.375rem;
        }
        
        /* ==========================================
           图片上传组件样式
           ========================================== */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            background: var(--bg-dark);
        }
        
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }
        
        .upload-zone.has-file {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }
        
        .upload-zone.error {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .upload-text {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .upload-hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .upload-input {
            display: none;
        }
        
        /* 上传文件列表 */
        .upload-list {
            margin-top: 1rem;
        }
        
        .upload-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: var(--bg-dark);
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .upload-thumb {
            width: 60px;
            height: 60px;
            border-radius: 0.375rem;
            object-fit: cover;
            background: var(--bg-hover);
        }
        
        .upload-info {
            flex: 1;
        }
        
        .upload-name {
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .upload-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        .upload-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        
        .status-icon.success {
            background: var(--success);
        }
        
        .status-icon.error {
            background: var(--danger);
        }
        
        .status-icon.pending {
            background: var(--warning);
        }
        
        /* 图片预览 */
        .preview-container {
            background: var(--bg-dark);
            border-radius: 0.75rem;
            padding: 1.5rem;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .preview-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 0.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .preview-info {
            margin-top: 1rem;
            text-align: center;
        }
        
        .preview-dimensions {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .preview-dimensions.error {
            color: var(--danger);
        }
        
        .preview-dimensions.success {
            color: var(--success);
        }
        
        /* 尺寸提示 */
        .size-requirements {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        
        .size-tag {
            padding: 0.25rem 0.625rem;
            background: var(--bg-hover);
            border-radius: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .size-tag.recommended {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }
        
        /* 链接配置 */
        .link-config {
            background: var(--bg-dark);
            border-radius: 0.75rem;
            padding: 1.25rem;
        }
        
        .link-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .link-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }
        
        .link-option label {
            flex: 1;
            cursor: pointer;
        }
        
        /* 批量上传 */
        .batch-upload {
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 3rem;
            text-align: center;
        }
        
        .batch-upload-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .batch-upload-text {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        
        .batch-upload-hint {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 0.25rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        
        .tab-btn {
            padding: 0.75rem 1.25rem;
            border: none;
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
        }
        
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* 两列布局 */
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        /* 进度条 */
        .progress-bar {
            height: 6px;
            background: var(--bg-hover);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        /* 广告预览模拟 */
        .ad-simulator {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border-radius: 1rem;
            padding: 2rem;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .ad-simulator-label {
            position: absolute;
            top: 1rem;
            left: 1rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .ad-placeholder {
            background: rgba(255,255,255,0.1);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.875rem;
        }
        
        .ad-placeholder.banner {
            width: 100%;
            max-width: 728px;
            height: 90px;
        }
        
        .ad-placeholder.box {
            width: 300px;
            height: 250px;
        }
        
        .ad-placeholder.skyscraper {
            width: 160px;
            height: 600px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .admin-main { padding: 1rem; }
            .form-row, .two-column { grid-template-columns: 1fr; }
            .modal { max-width: 95%; }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="admin-logo">
            <span class="icon">📢</span>
            <span>命运塔广告管理系统 Pro</span>
        </div>
        <nav class="admin-nav">
            <button class="nav-btn active" data-tab="overview">📊 总览</button>
            <button class="nav-btn" data-tab="placements">📍 广告点位</button>
            <button class="nav-btn" data-tab="campaigns">🎯 广告活动</button>
            <button class="nav-btn" data-tab="upload">📤 素材上传</button>
            <button class="nav-btn" data-tab="analytics">📈 数据分析</button>
        </nav>
    </header>

    <main class="admin-main">
        <!-- 总览页面 -->
        <div id="overview-tab" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card primary">
                    <div class="stat-header">
                        <div class="stat-icon primary">👁️</div>
                    </div>
                    <div class="stat-value" id="total-impressions">0</div>
                    <div class="stat-label">今日展示次数</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-header">
                        <div class="stat-icon success">🖱️</div>
                    </div>
                    <div class="stat-value" id="total-clicks">0</div>
                    <div class="stat-label">今日点击次数</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-header">
                        <div class="stat-icon warning">📊</div>
                    </div>
                    <div class="stat-value" id="ctr-rate">0%</div>
                    <div class="stat-label">点击率 (CTR)</div>
                </div>
                <div class="stat-card info">
                    <div class="stat-header">
                        <div class="stat-icon info">💰</div>
                    </div>
                    <div class="stat-value">¥<span id="daily-revenue">0</span></div>
                    <div class="stat-label">今日广告收入</div>
                </div>
            </div>
        </div>

        <!-- 广告点位页面 -->
        <div id="placements-tab" class="tab-content">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📍 17个广告点位管理</div>
                </div>
                <div class="panel-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>点位名称</th>
                                <th>推荐尺寸</th>
                                <th>类型</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="placements-table">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 素材上传页面 -->
        <div id="upload-tab" class="tab-content">
            <div class="two-column">
                <!-- 上传配置 -->
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">📤 上传广告素材</div>
                    </div>
                    <div class="panel-body">
                        <!-- 选择广告点位 -->
                        <div class="form-group">
                            <label class="form-label">选择广告点位 *</label>
                            <select class="form-select" id="upload-placement">
                                <option value="">请选择广告点位...</option>
                            </select>
                            <div class="size-requirements" id="size-requirements">
                                <span class="size-tag">请先选择广告点位</span>
                            </div>
                        </div>
                        
                        <!-- 拖拽上传区域 -->
                        <div class="form-group">
                            <label class="form-label">上传图片 *</label>
                            <div class="upload-zone" id="upload-zone">
                                <div class="upload-icon">📤</div>
                                <div class="upload-text">拖拽图片到此处，或点击上传</div>
                                <div class="upload-hint">
                                    支持 JPG, PNG, GIF, WebP | 最大 500KB | 自动压缩
                                </div>
                            </div>
                            <input type="file" class="upload-input" id="file-input" 
                                   accept="image/jpeg,image/png,image/gif,image/webp" multiple>
                        </div>
                        
                        <!-- 上传文件列表 -->
                        <div class="upload-list" id="upload-list">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>

                <!-- 实时预览 -->
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">👁️ 实时预览</div>
                    </div>
                    <div class="panel-body">
                        <div class="ad-simulator" id="ad-simulator">
                            <span class="ad-simulator-label">广告预览</span>
                            <div class="ad-placeholder banner" id="preview-area">
                                请选择广告点位并上传图片
                            </div>
                        </div>
                        
                        <div class="preview-info" id="preview-info">
                            <div class="preview-dimensions">推荐尺寸: -- x -- px</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 链接配置 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">🔗 链接配置</div>
                </div>
                <div class="panel-body">
                    <div class="two-column">
                        <div>
                            <div class="form-group">
                                <label class="form-label">跳转链接 URL *</label>
                                <input type="url" class="form-input" id="link-url" 
                                       placeholder="https://example.com/landing-page">
                                <div class="form-hint">广告点击后跳转的目标页面</div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">广告标题</label>
                                <input type="text" class="form-input" id="link-title" 
                                       placeholder="输入广告标题">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">广告描述</label>
                                <input type="text" class="form-input" id="link-desc" 
                                       placeholder="简短描述广告内容">
                            </div>
                        </div>
                        
                        <div>
                            <div class="link-config">
                                <div class="link-option">
                                    <input type="checkbox" id="link-new-window" checked>
                                    <label for="link-new-window">
                                        <strong>在新窗口打开</strong>
                                        <div style="font-size: 0.8rem; color: var(--text-secondary);">
                                            用户点击后在新标签页打开链接
                                        </div>
                                    </label>
                                </div>
                                
                                <div class="link-option">
                                    <input type="checkbox" id="link-tracking" checked>
                                    <label for="link-tracking">
                                        <strong>启用点击追踪</strong>
                                        <div style="font-size: 0.8rem; color: var(--text-secondary);">
                                            自动添加 utm_source 等追踪参数
                                        </div>
                                    </label>
                                </div>
                                
                                <div class="link-option">
                                    <input type="checkbox" id="link-nofollow">
                                    <label for="link-nofollow">
                                        <strong>添加 nofollow 属性</strong>
                                        <div style="font-size: 0.8rem; color: var(--text-secondary);">
                                            告诉搜索引擎不要追踪此链接
                                        </div>
                                    </label>
                                </div>
                            </div>
                            
                            <div class="form-group" style="margin-top: 1rem;">
                                <label class="form-label">自定义追踪参数</label>
                                <input type="text" class="form-input" id="link-params" 
                                       placeholder="campaign=spring_sale&source=banner">
                                <div class="form-hint">URL 查询参数格式，将自动附加到链接</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 1.5rem; text-align: center;">
                        <button class="btn btn-success" onclick="saveAdMaterial()">
                            💾 保存广告素材
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 广告点位配置
        const AD_PLACEMENTS = {
            'main-menu-banner': { name: '主菜单底部横幅', size: '728x90', type: 'banner', sizes: ['728x90', '468x60', '320x50'] },
            'loading-screen': { name: '游戏加载页', size: 'fullscreen', type: 'video', sizes: ['fullscreen'] },
            'round-end': { name: '回合结束间隙', size: '300x250', type: 'banner', sizes: ['300x250', '336x280'] },
            'pause-menu': { name: '暂停菜单', size: '300x250', type: 'banner', sizes: ['300x250'] },
            'victory-screen': { name: '胜利结算页', size: 'full-width', type: 'banner', sizes: ['728x90', '970x90'] },
            'defeat-screen': { name: '失败结算页', size: '300x250', type: 'banner', sizes: ['300x250'] },
            'tournament-register': { name: '锦标赛报名页', size: '728x90', type: 'banner', sizes: ['728x90', '468x60'] },
            'shop-sidebar': { name: '商店侧边栏', size: '160x600', type: 'skyscraper', sizes: ['160x600', '300x600'] },
            'profile-footer': { name: '用户中心底部', size: '728x90', type: 'banner', sizes: ['728x90'] },
            'leaderboard-page': { name: '排行榜页面', size: '728x90', type: 'banner', sizes: ['728x90'] },
            'postcard-gallery': { name: '明信片收藏册', size: '300x250', type: 'native', sizes: ['300x250'] },
            'streak-selector': { name: '连胜模式选择', size: '300x250', type: 'banner', sizes: ['300x250'] },
            'spectator-sidebar': { name: '观战模式侧边栏', size: '300x600', type: 'skyscraper', sizes: ['300x600', '160x600'] },
            'matchmaking-wait': { name: '匹配等待', size: 'fullscreen', type: 'video', sizes: ['fullscreen'] },
            'daily-missions': { name: '每日任务间隙', size: '300x250', type: 'native', sizes: ['300x250'] },
            'notification-inline': { name: '通知消息内嵌', size: 'text-link', type: 'text', sizes: ['text'] },
            'settings-footer': { name: '设置页面底部', size: '728x90', type: 'banner', sizes: ['728x90'] }
        };

        // 上传规则
        const UPLOAD_RULES = {
            maxSize: 500 * 1024, // 500KB
            formats: ['image/jpeg', 'image/png', 'image/gif', 'image/webp'],
            formatNames: { 'image/jpeg': 'JPG', 'image/png': 'PNG', 'image/gif': 'GIF', 'image/webp': 'WebP' }
        };

        // 当前上传的文件
        let currentFiles = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initNavigation();
            initPlacementsTable();
            initUploadZone();
            initPlacementSelect();
        });

        // 导航
        function initNavigation() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`${tab}-tab`).classList.add('active');
                });
            });
        }

        // 初始化点位表格
        function initPlacementsTable() {
            const tbody = document.getElementById('placements-table');
            tbody.innerHTML = Object.entries(AD_PLACEMENTS).map(([id, p]) => `
                <tr>
                    <td>${p.name}</td>
                    <td><span class="tag">${p.size}</span></td>
                    <td>${p.type}</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-secondary">配置</button>
                    </td>
                </tr>
            `).join('');
        }

        // 初始化点位选择
        function initPlacementSelect() {
            const select = document.getElementById('upload-placement');
            select.innerHTML = '<option value="">请选择广告点位...</option>' +
                Object.entries(AD_PLACEMENTS).map(([id, p]) => 
                    `<option value="${id}" data-size="${p.size}" data-type="${p.type}">${p.name} (${p.size})</option>`
                ).join('');
            
            select.addEventListener('change', function() {
                const placementId = this.value;
                if (placementId && AD_PLACEMENTS[placementId]) {
                    updateSizeRequirements(AD_PLACEMENTS[placementId]);
                    updatePreviewArea(AD_PLACEMENTS[placementId]);
                }
            });
        }

        // 更新尺寸要求显示
        function updateSizeRequirements(placement) {
            const container = document.getElementById('size-requirements');
            container.innerHTML = placement.sizes.map((size, i) => 
                `<span class="size-tag ${i === 0 ? 'recommended' : ''}">${size}${i === 0 ? ' (推荐)' : ''}</span>`
            ).join('');
        }

        // 更新预览区域
        function updatePreviewArea(placement) {
            const previewArea = document.getElementById('preview-area');
            const previewInfo = document.getElementById('preview-info');
            
            const [width, height] = placement.size === 'fullscreen' || placement.size === 'full-width' 
                ? [728, 90] 
                : placement.size === 'text-link' 
                    ? [300, 50]
                    : placement.size.split('x').map(Number);
            
            previewArea.className = 'ad-placeholder';
            previewArea.style.width = placement.type === 'skyscraper' ? '160px' : 
                                      placement.type === 'text' ? '300px' :
                                      Math.min(width, 728) + 'px';
            previewArea.style.height = height + 'px';
            previewArea.innerHTML = '上传图片后预览';
            
            previewInfo.innerHTML = `
                <div class="preview-dimensions">
                    推荐尺寸: ${placement.size === 'fullscreen' ? '全屏' : 
                              placement.size === 'full-width' ? '全宽 x 90px' : 
                              placement.size === 'text-link' ? '自适应' :
                              `${width} x ${height} px`}
                </div>
            `;
        }

        // 初始化上传区域
        function initUploadZone() {
            const zone = document.getElementById('upload-zone');
            const input = document.getElementById('file-input');
            
            zone.addEventListener('click', () => input.click());
            
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('dragover');
            });
            
            zone.addEventListener('dragleave', () => {
                zone.classList.remove('dragover');
            });
            
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            
            input.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });
        }

        // 处理文件
        function handleFiles(files) {
            const placementId = document.getElementById('upload-placement').value;
            if (!placementId) {
                alert('请先选择广告点位');
                return;
            }
            
            Array.from(files).forEach(file => {
                validateAndAddFile(file, placementId);
            });
        }

        // 验证并添加文件
        function validateAndAddFile(file, placementId) {
            const errors = [];
            
            // 格式检查
            if (!UPLOAD_RULES.formats.includes(file.type)) {
                errors.push(`不支持的格式: ${file.type}`);
            }
            
            // 大小检查
            if (file.size > UPLOAD_RULES.maxSize) {
                errors.push(`文件过大: ${(file.size/1024).toFixed(1)}KB > 500KB`);
            }
            
            const fileData = {
                id: Date.now() + Math.random(),
                file: file,
                name: file.name,
                size: file.size,
                type: file.type,
                placementId: placementId,
                errors: errors,
                status: errors.length > 0 ? 'error' : 'pending'
            };
            
            currentFiles.push(fileData);
            renderUploadList();
            
            // 如果没有错误，读取图片预览
            if (errors.length === 0) {
                readImagePreview(fileData);
            }
        }

        // 读取图片预览
        function readImagePreview(fileData) {
            const reader = new FileReader();
            reader.onload = (e) => {
                fileData.preview = e.target.result;
                
                // 获取图片尺寸
                const img = new Image();
                img.onload = () => {
                    fileData.dimensions = {
                        width: img.width,
                        height: img.height
                    };
                    
                    // 检查尺寸是否符合
                    const placement = AD_PLACEMENTS[fileData.placementId];
                    if (placement) {
                        checkImageDimensions(fileData, placement);
                    }
                    
                    renderUploadList();
                    updatePreviewImage(fileData);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(fileData.file);
        }

        // 检查图片尺寸
        function checkImageDimensions(fileData, placement) {
            const dims = fileData.dimensions;
            const [recWidth, recHeight] = placement.size.split('x').map(Number);
            
            // 允许 ±10% 的误差
            const tolerance = 0.1;
            const widthOk = Math.abs(dims.width - recWidth) / recWidth <= tolerance;
            const heightOk = Math.abs(dims.height - recHeight) / recHeight <= tolerance;
            
            if (!widthOk || !heightOk) {
                fileData.warnings = [`尺寸建议: ${recWidth}x${recHeight}px (当前: ${dims.width}x${dims.height}px)`];
            } else {
                fileData.status = 'success';
            }
        }

        // 渲染上传列表
        function renderUploadList() {
            const container = document.getElementById('upload-list');
            
            if (currentFiles.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = currentFiles.map(f => {
                const statusIcon = f.status === 'success' ? '✓' : 
                                   f.status === 'error' ? '✗' : '◐';
                const statusClass = f.status === 'success' ? 'success' : 
                                    f.status === 'error' ? 'error' : 'pending';
                
                return `
                    <div class="upload-item">
                        <img src="${f.preview || ''}" class="upload-thumb" 
                             style="${f.preview ? '' : 'display:none'}">
                        <div class="upload-info">
                            <div class="upload-name">${f.name}</div>
                            <div class="upload-meta">
                                ${UPLOAD_RULES.formatNames[f.type] || f.type} | 
                                ${(f.size/1024).toFixed(1)}KB
                                ${f.dimensions ? `| ${f.dimensions.width}x${f.dimensions.height}px` : ''}
                            </div>
                            ${f.errors.map(e => `<div style="color: var(--danger); font-size: 0.75rem;">${e}</div>`).join('')}
                            ${f.warnings ? f.warnings.map(w => `<div style="color: var(--warning); font-size: 0.75rem;">${w}</div>`).join('') : ''}
                        </div>
                        <div class="upload-status">
                            <span class="status-icon ${statusClass}">${statusIcon}</span>
                            <button class="btn btn-sm btn-danger" onclick="removeFile('${f.id}')">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新预览图片
        function updatePreviewImage(fileData) {
            const previewArea = document.getElementById('preview-area');
            const placement = AD_PLACEMENTS[fileData.placementId];
            
            if (fileData.preview) {
                previewArea.innerHTML = `
                    <img src="${fileData.preview}" class="preview-image" 
                         style="${placement?.type === 'skyscraper' ? 'max-height: 400px;' : ''}">
                `;
                
                // 更新尺寸提示
                if (fileData.dimensions && placement) {
                    const [recWidth, recHeight] = placement.size.split('x').map(Number);
                    const dims = fileData.dimensions;
                    const isMatch = Math.abs(dims.width - recWidth) / recWidth <= 0.1 &amp;&amp; 
                                   Math.abs(dims.height - recHeight) / recHeight <= 0.1;
                    
                    document.getElementById('preview-info').innerHTML = `
                        <div class="preview-dimensions ${isMatch ? 'success' : 'error'}">
                            实际尺寸: ${dims.width}x${dims.height}px | 
                            推荐: ${recWidth}x${recHeight}px
                            ${isMatch ? '✓ 符合要求' : '⚠ 尺寸不匹配'}
                        </div>
                    `;
                }
            }
        }

        // 删除文件
        function removeFile(id) {
            currentFiles = currentFiles.filter(f => f.id != id);
            renderUploadList();
            
            if (currentFiles.length === 0) {
                document.getElementById('preview-area').innerHTML = '请选择广告点位并上传图片';
                document.getElementById('preview-info').innerHTML = '<div class="preview-dimensions">推荐尺寸: -- x -- px</div>';
            }
        }

        // 保存广告素材
        function saveAdMaterial() {
            if (currentFiles.length === 0) {
                alert('请先上传图片');
                return;
            }
            
            const validFiles = currentFiles.filter(f => f.status !== 'error');
            if (validFiles.length === 0) {
                alert('没有有效的上传文件');
                return;
            }
            
            const placementId = document.getElementById('upload-placement').value;
            const linkUrl = document.getElementById('link-url').value;
            
            if (!linkUrl) {
                alert('请填写跳转链接');
                document.getElementById('link-url').focus();
                return;
            }
            
            // 构建广告素材数据
            const adMaterial = {
                id: 'ad_' + Date.now(),
                placementId: placementId,
                images: validFiles.map(f => ({
                    name: f.name,
                    preview: f.preview,
                    dimensions: f.dimensions
                })),
                link: {
                    url: linkUrl,
                    title: document.getElementById('link-title').value,
                    description: document.getElementById('link-desc').value,
                    newWindow: document.getElementById('link-new-window').checked,
                    tracking: document.getElementById('link-tracking').checked,
                    nofollow: document.getElementById('link-nofollow').checked,
                    params: document.getElementById('link-params').value
                },
                createdAt: new Date().toISOString()
            };
            
            // 保存到本地存储
            const materials = JSON.parse(localStorage.getItem('ad_materials') || '[]');
            materials.push(adMaterial);
            localStorage.setItem('ad_materials', JSON.stringify(materials));
            
            alert(`✅ 成功保存广告素材！\n\n点位: ${AD_PLACEMENTS[placementId]?.name}\n图片: ${validFiles.length} 张\n链接: ${linkUrl}`);
            
            // 重置表单
            currentFiles = [];
            renderUploadList();
            document.getElementById('link-url').value = '';
            document.getElementById('link-title').value = '';
            document.getElementById('link-desc').value = '';
        }
    </script>
</body>
</html>
